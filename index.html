<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2c3e50">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Einrichteblatt Zerspanung Josef Hohn GmbH</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root { --primary: #2c3e50; --sec: #3498db; --bg: #f4f7f6; --white: #fff; --accent: #e67e22; --success: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #333; touch-action: manipulation; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { cursor: pointer; transition: color 0.2s; font-size: 1.8em; margin: 0; }
        .header h1:hover { color: var(--sec); }

        .card { background: var(--white); padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .nav-btn { padding: 12px 24px; background: var(--primary); color: var(--white); border: none; cursor: pointer; border-radius: 6px; font-weight: bold; font-size: 1.1em; }
        
        .landing-wrapper { display: flex; gap: 30px; justify-content: center; align-items: center; min-height: 70vh; flex-wrap: wrap; }
        .landing-tile { 
            background: white; width: 320px; height: 240px; border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; border: 2px solid transparent;
        }
        .landing-tile:active { transform: scale(0.95); }
        .tile-icon { font-size: 5em; margin-bottom: 20px; color: var(--primary); }
        .tile-text { font-size: 1.6em; font-weight: bold; color: var(--primary); }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .grid-tools { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 1em; }
        input[type="text"], input[type="number"], select, .wizard-input { 
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; 
            box-sizing: border-box; font-size: 16px; background: #f9f9f9; 
        }
        
        .tool-box { border: 1px solid #eee; padding: 10px; border-radius: 6px; background: #fff; min-height: 100px; }
        .assigned-item { background: #f0f8ff; border: 1px solid #d6eaf8; padding: 8px; margin-bottom: 5px; border-radius: 4px; }
        .btn-slot-add { width: 100%; background: #ecf0f1; border: none; color: #7f8c8d; cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 1.3em; padding: 8px 0; }

        .wizard-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); z-index: 2000; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .wizard-card { background: white; padding: 40px; border-radius: 12px; width: 100%; max-width: 700px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.4); max-height: 95vh; overflow-y: auto; }
        .wizard-step { display: none; }
        .wizard-step.active { display: block; }
        .wiz-btn-group { display: flex; gap: 15px; justify-content: center; margin-top: 25px; }
        
        .wiz-grid-select { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .wiz-option-btn { padding: 25px 15px; background: #f8f9fa; border: 2px solid #eee; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .wiz-option-btn.selected { background: #eaf2f8; border-color: var(--sec); color: var(--sec); }

        .wiz-tool-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .wiz-t-btn { padding: 20px; background: #f9f9f9; border: 1px solid #ddd; border-radius: 10px; cursor: pointer; }
        .wiz-t-btn.defined { background: #e8f8f5; border-color: var(--success); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 3000; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 95%; max-width: 600px; max-height: 90vh; overflow-y: auto; }

        .preset-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; max-height: 350px; overflow-y: auto; padding: 5px; border: 1px solid #eee; background: #fff; border-radius: 6px; }
        .preset-btn { 
            padding: 10px 12px; background: white; border: 1px solid #ccc; border-radius: 6px; 
            cursor: pointer; flex: 1 0 calc(50% - 10px); text-align: left; transition: 0.1s;
            display: flex; flex-direction: column;
        }
        .preset-btn span.art { color: var(--sec); font-weight: bold; font-size: 0.95em; }
        .preset-btn span.desc { color: #666; font-size: 0.85em; margin-top: 2px; }
        .preset-btn.active { background: var(--sec); border-color: var(--sec); }
        .preset-btn.active span { color: white; }

        .pdf-mode { background: white !important; padding: 10px !important; }
        .pdf-mode .card { box-shadow: none !important; border: 1px solid #000 !important; break-inside: avoid !important; }
        
        .hidden { display: none !important; }
        .btn-action { color: white; border: none; padding: 18px; width: 100%; font-size: 1.2em; font-weight: bold; cursor: pointer; border-radius: 8px; }
        .no-print { display: block; }
    </style>
</head>
<body>

<div id="wizardOverlay" class="wizard-overlay hidden">
    <div class="wizard-card">
        <div id="step1" class="wizard-step active">
            <h3>1. Artikelnummer</h3>
            <input type="text" id="wiz_artNr" class="wizard-input" placeholder="Artikelnummer eingeben...">
            <div class="wiz-btn-group">
                <button class="nav-btn" onclick="closeWizard()">Abbrechen</button>
                <button class="nav-btn" style="background:var(--sec)" onclick="nextStep(2)">Weiter</button>
            </div>
        </div>
        <div id="step2" class="wizard-step">
            <h3>2. Arbeitsfolge</h3>
            <div class="wiz-grid-select">
                <div class="wiz-option-btn" onclick="selectWizSeq('Drehen')">Drehen</div>
                <div class="wiz-option-btn" onclick="selectWizSeq('Fräsen')">Fräsen</div>
                <div class="wiz-option-btn" onclick="selectWizSeq('Bohren')">Bohren</div>
            </div>
        </div>
        <div id="step3" class="wizard-step">
            <h3>3. Maschine</h3>
            <div class="wiz-grid-select" id="wiz_machine_grid"></div>
        </div>
        <div id="step4" class="wizard-step">
            <h3>4. Mitarbeiter</h3>
            <div class="wiz-grid-select" id="wiz_employee_grid"></div>
        </div>
        <div id="step5" class="wizard-step">
            <h3>5. Werkzeuge</h3>
            <div class="wiz-tool-grid" id="wiz_tool_grid"></div>
            <div class="wiz-btn-group">
                <button class="nav-btn" style="background:var(--success)" onclick="finishWizard()">Fertigstellen</button>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <div class="header no-print">
        <h1 onclick="switchView('landing')">Einrichteblatt Zerspanung Josef Hohn GmbH</h1>
        <button class="nav-btn" onclick="switchView('landing')">Startseite</button>
    </div>

    <div id="landing-view" class="landing-wrapper">
        <div class="landing-tile" onclick="startWizard()">
            <div class="tile-icon">＋</div>
            <div class="tile-text">Neues Einrichteblatt</div>
        </div>
        <div class="landing-tile" onclick="switchView('search')">
            <div class="tile-icon">🔍</div>
            <div class="tile-text">Archiv suchen</div>
        </div>
    </div>

    <div id="create-view" class="hidden">
        <div id="printableArea">
            <div class="card">
                <h2>Allgemeine Daten</h2>
                <div class="grid-2">
                    <div class="form-group"><label>Artikel</label><input type="text" id="artNr"></div>
                    <div class="form-group"><label>Folge</label><input type="text" id="sequence" readonly></div>
                    <div class="form-group"><label>Maschine</label><input type="text" id="machine" readonly></div>
                    <div class="form-group"><label>Mitarbeiter</label><input type="text" id="employee"></div>
                </div>
            </div>
            <div class="card" id="toolContainer"></div>
        </div>
        <button class="btn-action no-print" style="background:var(--success)" onclick="processAndSendWithPDF()">Speichern & E-Mail senden</button>
    </div>

    <div id="search-view" class="hidden">
        <div class="card">
            <h2>Gespeicherte Blätter</h2>
            <table id="dataTable" style="width:100%">
                <thead><tr><th>Datum</th><th>Artikel</th><th>Maschine</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="toolModal" class="modal-overlay hidden">
    <div class="modal-content">
        <h3>Werkzeug T<span id="modalTargetT"></span></h3>
        <select id="modalToolType" onchange="renderToolFields()" class="wizard-input">
            <option value="Drehmeißel">Drehmeißel</option>
            <option value="Bohrer">Bohrer</option>
            <option value="Fräser">Fräser</option>
        </select>
        <div id="dynamicFieldsContainer" style="margin-top:15px;"></div>
        <button class="btn-action" style="background:var(--success); margin-top:10px;" onclick="saveToolFromModal()">Übernehmen</button>
        <button class="btn-action" style="background:#ccc; margin-top:5px;" onclick="closeModal()">Abbrechen</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxNddcw2tVtSwdszm46hDoDnMk-zL1PpioMNQvVT9ql585NPAUYxQ6DjhmTGlq9cpoB1Q/exec";

    const firebaseConfig = {
        apiKey: "AIzaSyDJueI6GEUCSKhHOC8CHZlLmDDNylmohkk",
        authDomain: "digitales-einrichteblatt.firebaseapp.com",
        projectId: "digitales-einrichteblatt",
        storageBucket: "digitales-einrichteblatt.firebasestorage.app",
        messagingSenderId: "656735513232",
        appId: "1:656735513232:web:2a84f80291771f54cd4615"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // NEUE LISTE BASIEREND AUF SCREENSHOT
    const isoPresets = [
        { art: "CNMG120412-UR-YG3115", desc: "CNMG120412-UR-YG3115" },
        { art: "SNMG120412-UR-YG3115", desc: "Schruppplatte R1,2" },
        { art: "DNMG150616-UG-YG3115", desc: "DNMG150616-UG-YG3115" },
        { art: "1-02-056378", desc: "DNMG150604" },
        { art: "DNMG150612-UC-YG3115", desc: "DNMG150612-UC-YG3115" },
        { art: "88700341", desc: "CBN WSP R0,4" },
        { art: "88700343", desc: "CBN WSP R0,8" },
        { art: "DNUX150604R-YG3020", desc: "nur für Pronto 4 / NH" },
        { art: "DCMT11T308-MP MC6025", desc: "Schruppplatte-Innen R0,8" },
        { art: "DCMT11T304 UE6020", desc: "Schlichtplatte-Innen R0,4 gelb hell" },
        { art: "DNMX150608-MW MC5115", desc: "DNMX150608-MW MC5115" },
        { art: "DC0621T", desc: "Schraube M6x1" },
        { art: "PSSNR2525M12", desc: "Schrupper Außen links" },
        { art: "LLCS108", desc: "Schraube für Drehhalter" },
        { art: "CCMT120408-MW UE6020", desc: "CCMT120408-MW UE6020" },
        { art: "MMT16ERG60", desc: "MMT16ERG60" },
        { art: "DCMT070204-LP MC6025", desc: "Wendeschneidplatte Innen" },
        { art: "VCMT110304-LM VP15TF", desc: "VCMT110304-LM VP15TF" },
        { art: "CNMG120404-MA", desc: "CNMG120404-MA MC6025" }
    ];

    const machines = { "Drehen": ["Pronto 1", "Pronto 3", "Pronto 5"], "Fräsen": ["DMU 80", "DMU 125"], "Bohren": ["Doosan 3"] };
    let wizardToolsData = {};

    window.switchView = (v) => { document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden')); document.getElementById(v + '-view').classList.remove('hidden'); };
    window.startWizard = () => { wizardToolsData={}; window.showStep(1); document.getElementById('wizardOverlay').classList.remove('hidden'); };
    window.closeWizard = () => document.getElementById('wizardOverlay').classList.add('hidden');
    window.showStep = (n) => { document.querySelectorAll('.wizard-step').forEach(s => s.classList.remove('active')); document.getElementById('step'+n).classList.add('active'); };
    window.nextStep = (n) => window.showStep(n);

    window.selectWizSeq = (s) => { 
        document.getElementById('sequence').value = s; 
        const grid = document.getElementById('wiz_machine_grid'); grid.innerHTML = '';
        machines[s].forEach(m => grid.innerHTML += `<div class="wiz-option-btn" onclick="selectWizMachine('${m}')">${m}</div>`);
        window.nextStep(3);
    };
    window.selectWizMachine = (m) => { document.getElementById('machine').value = m; window.nextStep(4); renderEmp(); };
    function renderEmp() {
        const grid = document.getElementById('wiz_employee_grid'); grid.innerHTML = '';
        ["Lange", "Oks", "Saric"].forEach(e => grid.innerHTML += `<div class="wiz-option-btn" onclick="selectWizEmployee('${e}')">${e}</div>`);
    }
    window.selectWizEmployee = (e) => { document.getElementById('employee').value = e; window.nextStep(5); window.renderWizardToolGrid(); };

    window.renderWizardToolGrid = () => {
        const g = document.getElementById('wiz_tool_grid'); g.innerHTML = '';
        for(let i=1; i<=12; i++) g.innerHTML += `<div class="wiz-t-btn ${wizardToolsData[i]?'defined':''}" onclick="openModal(${i})">T${i}</div>`;
    };

    let curT = 1;
    window.openModal = (i) => { curT = i; document.getElementById('modalTargetT').innerText = i; document.getElementById('toolModal').classList.remove('hidden'); renderToolFields(); };
    window.closeModal = () => document.getElementById('toolModal').classList.add('hidden');

    window.renderToolFields = () => {
        const type = document.getElementById('modalToolType').value;
        const c = document.getElementById('dynamicFieldsContainer'); c.innerHTML = '';
        if(type === 'Drehmeißel') {
            let html = `<label>Wendeplatte auswählen:</label><div class="preset-grid">`;
            isoPresets.forEach(p => html += `<button class="preset-btn" onclick="setIso('${p.art}', this)"><span class="art">${p.art}</span><span class="desc">${p.desc}</span></button>`);
            html += `</div><input type="text" id="dyn_iso" class="wizard-input" placeholder="Oder manuell...">`;
            c.innerHTML = html;
        } else {
            c.innerHTML = `<input type="text" id="dyn_val" class="wizard-input" placeholder="Details...">`;
        }
    };

    window.setIso = (val, btn) => {
        document.getElementById('dyn_iso').value = val;
        btn.parentElement.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    };

    window.saveToolFromModal = () => {
        const type = document.getElementById('modalToolType').value;
        const val = type === 'Drehmeißel' ? document.getElementById('dyn_iso').value : document.getElementById('dyn_val').value;
        wizardToolsData[curT] = { type, val };
        window.renderWizardToolGrid();
        window.closeModal();
    };

    window.finishWizard = () => {
        document.getElementById('artNr').value = document.getElementById('wiz_artNr').value;
        const cont = document.getElementById('toolContainer'); cont.innerHTML = '<h2>Werkzeuge</h2>';
        for(let i=1; i<=12; i++) {
            const d = wizardToolsData[i];
            cont.innerHTML += `<div class="tool-box"><strong>T${i}</strong>: ${d ? d.type + ' (' + d.val + ')' : 'Leer'}</div>`;
        }
        window.closeWizard(); window.switchView('create');
    };

    window.processAndSendWithPDF = async () => {
        const el = document.getElementById('printableArea');
        el.classList.add('pdf-mode');
        const opt = { margin: 10, filename: 'Einrichteblatt.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
        const pdfBase64 = (await html2pdf().set(opt).from(el).outputPdf('datauristring')).split(',')[1];
        el.classList.remove('pdf-mode');

        await addDoc(collection(db, "ruestblaetter"), { artNr: document.getElementById('artNr').value, createdAt: serverTimestamp() });
        await fetch(GOOGLE_SCRIPT_URL, { method: "POST", headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ pdfBase64, artNr: document.getElementById('artNr').value }) });
        alert("Erfolgreich versendet!");
        window.switchView('landing');
    };
</script>
</body>
</html>
